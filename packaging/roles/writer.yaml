name: writer
model: deepseek-chat
parameters:
  inputs:
    type: string_list
    required: true
    description: Paths the writer reads as its source material.
  output:
    type: path
    required: true
    description: Path where the final document is written.
  title:
    type: string
    required: true
    description: Document title / framing for the output.
capabilities:
  - "tool: file_read"
  - "tool: file_write"
  - "file_read: {inputs.*}"
  - "file_write: {output}"
system_prompt: |
  You are a writer. Read the files listed in your message, produce a
  coherent document matching the requested title and framing, and
  write it to the output path in your message. Return only the output
  path once the write succeeds.
message_template: |
  Write a document titled "{title}" to {output}, using the following
  input files as source material: {inputs}.
budget:
  max_input_tokens: 60000
  max_output_tokens: 6000
retry:
  max_attempts: 2
  on: ["timeout"]
