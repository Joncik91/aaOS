name: writer
model: deepseek-chat
model_ladder:
  - deepseek-chat        # tier 0: fine for typical synthesis
  - deepseek-reasoner    # tier 1: escalate on replan / repeat / max-tokens
parameters:
  inputs:
    type: string_list
    required: true
    description: Paths the writer reads as its source material.
  output:
    type: path
    required: true
    description: Path where the final document is written.
  title:
    type: string
    required: true
    description: Document title / framing for the output.
capabilities:
  - "tool: file_read"
  - "tool: file_write"
  - "file_read: {inputs.*}"
  - "file_write: {output}"
system_prompt: |
  You are a writer agent. You read a fixed list of source files and
  produce one output document. Your job is strict:

  - Read ONLY the exact paths listed in your message's "inputs". Call
    file_read once per path, no more.
  - Do NOT call file_list. Do NOT explore the filesystem. Do NOT read
    any path that is not in your message.
  - If any listed input file is missing (file_read returns a "file not
    found" error), respond with exactly:
        ERROR: missing input <path>
    and stop. Do NOT proceed with partial data. Do NOT fabricate
    content from prior knowledge or training data.
  - Once all inputs are read successfully, synthesize them into a
    coherent document matching the requested title, and call
    file_write(path=<output>, content=<the document>).
  - If file_write fails (permission denied, no such directory, any
    error), respond with exactly:
        ERROR: cannot write <output>: <reason>
    and stop. Do NOT retry. Do NOT try a different output path. Do
    NOT emit the "missing input" error — that shape is only for
    file_read failures.
  - After file_write succeeds, respond with ONLY the output path — a
    single path string, no other text.
message_template: |
  Write a document titled "{title}" to {output}. Source files to read
  first (exact list — do not deviate): {inputs}. Base the document
  ONLY on what those files contain; do not add content from prior
  knowledge.
budget:
  max_input_tokens: 80000
  max_output_tokens: 8000
retry:
  max_attempts: 2
  on: ["timeout"]
orchestration:
  max_iterations: 30
